<!--
  Tasks panel template. Director's runtime renders this inline (not
  iframed), so we deliberately avoid <style> blocks that would bleed
  into the rest of the app.

  Attribute hooks:
    {{field}}                   interpolate field from current item
    data-loop="<group>"         repeat element per item in group
    data-when="<expr>"          render only if expression is truthy
    data-action="<verb>:<args>" wire onclick/onchange
                                verbs: patch, delete, add, open

  Groups derived in the runtime by `status`: in_progress | pending | completed.
-->

<div class="px-8 pt-6 pb-8 text-foreground">
  <section data-when="data.length == 0">
    <p class="text-[12px] italic text-muted-foreground py-3">
      no tasks yet — the orch creates these via TaskCreate / TodoWrite
    </p>
  </section>

  <section data-when="data.length > 0" class="space-y-6">

    <div data-when="in_progress.length > 0">
      <div class="text-[10px] font-medium tracking-[0.22em] uppercase text-muted-foreground mb-2">
        In progress
      </div>
      <ul class="space-y-1">
        <li data-loop="in_progress" class="flex items-center gap-3 py-1.5">
          <input type="checkbox"
                 data-action="patch:status=completed"
                 title="Mark complete"
                 class="appearance-none w-[14px] h-[14px] rounded-[3px] border border-border bg-transparent checked:bg-foreground checked:border-foreground cursor-pointer flex-shrink-0 transition-colors" />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] leading-snug break-words">{{subject}}</div>
            <div data-when="description" class="text-[11.5px] text-muted-foreground mt-0.5 break-words">{{description}}</div>
          </div>
          <button data-action="delete"
                  title="Delete"
                  class="opacity-30 hover:opacity-100 text-muted-foreground hover:text-foreground text-[16px] leading-none px-1 transition-opacity">×</button>
        </li>
      </ul>
    </div>

    <div data-when="pending.length > 0">
      <div class="text-[10px] font-medium tracking-[0.22em] uppercase text-muted-foreground mb-2">
        To do
      </div>
      <ul class="space-y-1">
        <li data-loop="pending" class="flex items-center gap-3 py-1.5">
          <input type="checkbox"
                 data-action="patch:status=completed"
                 title="Mark complete"
                 class="appearance-none w-[14px] h-[14px] rounded-[3px] border border-border bg-transparent checked:bg-foreground checked:border-foreground cursor-pointer flex-shrink-0 transition-colors" />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] leading-snug break-words">{{subject}}</div>
            <div data-when="description" class="text-[11.5px] text-muted-foreground mt-0.5 break-words">{{description}}</div>
          </div>
          <button data-action="delete"
                  title="Delete"
                  class="opacity-30 hover:opacity-100 text-muted-foreground hover:text-foreground text-[16px] leading-none px-1 transition-opacity">×</button>
        </li>
      </ul>
    </div>

    <div data-when="completed.length > 0">
      <div class="text-[10px] font-medium tracking-[0.22em] uppercase text-muted-foreground mb-2">
        Done
      </div>
      <ul class="space-y-1">
        <li data-loop="completed" class="flex items-center gap-3 py-1.5 opacity-70">
          <input type="checkbox" checked
                 data-action="patch:status=pending"
                 title="Reopen"
                 class="appearance-none w-[14px] h-[14px] rounded-[3px] border border-border bg-transparent checked:bg-foreground checked:border-foreground cursor-pointer flex-shrink-0 transition-colors" />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] leading-snug line-through text-muted-foreground break-words">{{subject}}</div>
          </div>
          <button data-action="delete"
                  title="Delete"
                  class="opacity-30 hover:opacity-100 text-muted-foreground hover:text-foreground text-[16px] leading-none px-1 transition-opacity">×</button>
        </li>
      </ul>
    </div>

  </section>
</div>
