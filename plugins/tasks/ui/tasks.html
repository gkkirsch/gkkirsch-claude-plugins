<!--
  Tasks panel template. Director's runtime renders this inline (not
  iframed), so we deliberately avoid <style> blocks that would bleed
  into the rest of the app.

  Attribute hooks:
    {{field}}                   interpolate field from current item
    data-loop="<group>"         repeat element per item in group
    data-when="<expr>"          render only if expression is truthy
    data-action="<verb>:<args>" wire onclick/onchange
                                verbs: patch, delete, create, open
    data-form                   creation-form boundary (collected by create)
    data-field="<name>"         input value to send on create

  Groups derived in the runtime by `status`: in_progress | pending | completed.
-->

<div class="space-y-5">

  <!-- Always-visible create form. Subject + optional description in a
       single composite card. Press Enter on either input to submit
       (runtime wires the data-action="create" click). The + button
       is small and tucked into the description row so it doesn't
       compete with the subject for visual weight. -->
  <div data-form
       class="rounded-lg border border-border/60 bg-background focus-within:border-foreground/30 transition-colors overflow-hidden">
    <input type="text"
           data-field="subject"
           placeholder="New task…"
           autocorrect="off"
           autocapitalize="off"
           spellcheck="false"
           autocomplete="off"
           class="w-full text-[13px] leading-tight px-3 py-2 bg-transparent placeholder:text-muted-foreground/60 focus:outline-none border-0" />
    <div class="flex items-stretch border-t border-border/40">
      <input type="text"
             data-field="description"
             placeholder="Description (optional)"
             autocorrect="off"
             autocapitalize="off"
             spellcheck="false"
             autocomplete="off"
             class="flex-1 min-w-0 text-[12px] leading-tight px-3 py-2 bg-transparent placeholder:text-muted-foreground/45 text-muted-foreground focus:text-foreground focus:outline-none border-0" />
      <button data-action="create"
              title="Add task — or press Enter"
              class="shrink-0 px-3 text-muted-foreground hover:text-foreground hover:bg-muted/40 transition-colors text-[15px] leading-none">+</button>
    </div>
  </div>

  <section data-when="data.length == 0">
    <p class="text-[12px] italic text-muted-foreground">
      no tasks yet — add one above, or let the agent fill these in via TaskCreate / TodoWrite
    </p>
  </section>

  <section data-when="data.length > 0" class="space-y-6">

    <div data-when="in_progress.length > 0">
      <div class="text-[10px] font-medium tracking-[0.22em] uppercase text-muted-foreground mb-2">
        In progress
      </div>
      <ul class="space-y-1">
        <li data-loop="in_progress" class="flex items-center gap-3 py-1.5">
          <input type="checkbox"
                 data-action="patch:status=completed"
                 title="Mark complete"
                 />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] leading-snug break-words">{{subject}}</div>
            <div data-when="owner" class="text-[10.5px] tracking-[0.16em] uppercase text-muted-foreground/80 mt-0.5">→ {{owner}}</div>
            <div data-when="description" class="text-[11.5px] text-muted-foreground mt-0.5 break-words">{{description}}</div>
          </div>
          <button data-action="delete"
                  title="Delete"
                  class="opacity-30 hover:opacity-100 text-muted-foreground hover:text-foreground text-[16px] leading-none px-1 transition-opacity">×</button>
        </li>
      </ul>
    </div>

    <div data-when="pending.length > 0">
      <div class="text-[10px] font-medium tracking-[0.22em] uppercase text-muted-foreground mb-2">
        To do
      </div>
      <ul class="space-y-1">
        <li data-loop="pending" class="flex items-center gap-3 py-1.5">
          <input type="checkbox"
                 data-action="patch:status=completed"
                 title="Mark complete"
                 />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] leading-snug break-words">{{subject}}</div>
            <div data-when="owner" class="text-[10.5px] tracking-[0.16em] uppercase text-muted-foreground/80 mt-0.5">→ {{owner}}</div>
            <div data-when="description" class="text-[11.5px] text-muted-foreground mt-0.5 break-words">{{description}}</div>
          </div>
          <button data-action="delete"
                  title="Delete"
                  class="opacity-30 hover:opacity-100 text-muted-foreground hover:text-foreground text-[16px] leading-none px-1 transition-opacity">×</button>
        </li>
      </ul>
    </div>

    <div data-when="completed.length > 0">
      <div class="text-[10px] font-medium tracking-[0.22em] uppercase text-muted-foreground mb-2">
        Done
      </div>
      <ul class="space-y-1">
        <li data-loop="completed" class="flex items-center gap-3 py-1.5 opacity-70">
          <input type="checkbox" checked
                 data-action="patch:status=pending"
                 title="Reopen"
                 />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] leading-snug line-through text-muted-foreground break-words">{{subject}}</div>
          </div>
          <button data-action="delete"
                  title="Delete"
                  class="opacity-30 hover:opacity-100 text-muted-foreground hover:text-foreground text-[16px] leading-none px-1 transition-opacity">×</button>
        </li>
      </ul>
    </div>

  </section>
</div>
